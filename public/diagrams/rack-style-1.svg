<svg xmlns="http://www.w3.org/2000/svg" xmlns:gn="http://www.goodnotes.com/gn-svg" width="900" height="660" viewBox="0 0 900 660">
  <defs>
    <marker id="arr-b" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <polygon points="0 0,8 4,0 8" fill="#2563eb"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <polygon points="0 0,8 4,0 8" fill="#15803d"/>
    </marker>
    <marker id="arr-r" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <polygon points="0 0,8 4,0 8" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- TITLE -->
  <text x="450" y="24" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1e293b">RACK STYLE 1 — Standard Receiver Rack (Full Refrigeration Circuit)</text>

  <!-- CONDENSER (top) -->
  <rect x="180" y="40" width="540" height="80" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="270" y="38" text-anchor="middle" font-family="Arial" font-size="13" fill="#94a3b8">&#8595;</text>
  <text x="360" y="38" text-anchor="middle" font-family="Arial" font-size="13" fill="#94a3b8">&#8595;</text>
  <text x="450" y="38" text-anchor="middle" font-family="Arial" font-size="13" fill="#94a3b8">&#8595;</text>
  <text x="540" y="38" text-anchor="middle" font-family="Arial" font-size="13" fill="#94a3b8">&#8595;</text>
  <text x="630" y="38" text-anchor="middle" font-family="Arial" font-size="13" fill="#94a3b8">&#8595;</text>
  <path d="M 200,53 H 700 V 65 H 200 V 77 H 700 V 89 H 200 V 101 H 700" stroke="#475569" stroke-width="2" fill="none" stroke-linecap="round"/>
  <text x="450" y="133" text-anchor="middle" font-family="Arial" font-size="10" font-weight="600" fill="#475569">CONDENSER — Rooftop Air-Cooled (Pressure-Based Fan Control)</text>

  <!-- Condensed liquid pipe: condenser → receiver -->
  <line x1="450" y1="120" x2="450" y2="148" stroke="#2563eb" stroke-width="2.5"/>
  <text x="460" y="140" font-family="Arial" font-size="8" fill="#2563eb">condensed liquid</text>
  <line x1="450" y1="148" x2="620" y2="148" stroke="#2563eb" stroke-width="2.5"/>
  <line x1="620" y1="148" x2="620" y2="146" stroke="#2563eb" stroke-width="2.5"/>

  <!-- LIQUID RECEIVER (inline, right side) -->
  <ellipse cx="620" cy="158" rx="70" ry="12" fill="#bfdbfe" stroke="#2563eb" stroke-width="2"/>
  <rect x="550" y="158" width="140" height="100" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <ellipse cx="620" cy="258" rx="70" ry="12" fill="#93c5fd" stroke="#2563eb" stroke-width="2"/>
  <text x="620" y="196" text-anchor="middle" font-family="Arial" font-size="13" font-weight="700" fill="#1d4ed8">LIQUID RECEIVER</text>
  <text x="620" y="213" text-anchor="middle" font-family="Arial" font-size="9" fill="#1e40af">Inline — all liquid passes through</text>
  <text x="620" y="230" text-anchor="middle" font-family="Arial" font-size="10" font-weight="700" fill="#15803d">Full = NORMAL ✓</text>
  <text x="620" y="248" text-anchor="middle" font-family="Arial" font-size="8" fill="#1e40af">Gravity-fed; liquid subcools ~10-15°F</text>

  <!-- Receiver → filter-drier -->
  <line x1="620" y1="270" x2="620" y2="290" stroke="#2563eb" stroke-width="2.5"/>
  <line x1="620" y1="290" x2="490" y2="290" stroke="#2563eb" stroke-width="2.5"/>

  <!-- FILTER-DRIER -->
  <ellipse cx="466" cy="290" rx="22" ry="9" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="444" y="290" width="44" height="24" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <ellipse cx="466" cy="314" rx="22" ry="9" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="420" y="305" text-anchor="end" font-family="Arial" font-size="9" fill="#475569">Filter-Drier</text>

  <!-- Filter-drier → sight glass -->
  <line x1="444" y1="302" x2="390" y2="302" stroke="#2563eb" stroke-width="2.5"/>

  <!-- SIGHT GLASS -->
  <circle cx="370" cy="302" r="12" fill="#eff6ff" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="362" y1="302" x2="378" y2="302" stroke="#94a3b8" stroke-width="1"/>
  <line x1="370" y1="294" x2="370" y2="310" stroke="#94a3b8" stroke-width="1"/>
  <text x="370" y="288" text-anchor="middle" font-family="Arial" font-size="9" fill="#475569">Sight Glass</text>

  <!-- Sight glass → liquid header -->
  <line x1="358" y1="302" x2="280" y2="302" stroke="#2563eb" stroke-width="2.5"/>
  <line x1="280" y1="302" x2="280" y2="335" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arr-b)"/>

  <!-- LIQUID HEADER -->
  <rect x="60" y="335" width="560" height="28" rx="4" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="340" y="354" text-anchor="middle" font-family="Arial" font-size="12" font-weight="700" fill="#1d4ed8">LIQUID HEADER (with LLS &amp; TXV per circuit)</text>

  <!-- Branch pipes to evaporators -->
  <line x1="150" y1="363" x2="150" y2="385" stroke="#2563eb" stroke-width="2" marker-end="url(#arr-b)"/>
  <line x1="340" y1="363" x2="340" y2="385" stroke="#2563eb" stroke-width="2" marker-end="url(#arr-b)"/>
  <line x1="530" y1="363" x2="530" y2="385" stroke="#2563eb" stroke-width="2" marker-end="url(#arr-b)"/>
  <text x="150" y="378" text-anchor="middle" font-family="Arial" font-size="8" fill="#475569">LLS→TXV</text>
  <text x="340" y="378" text-anchor="middle" font-family="Arial" font-size="8" fill="#475569">LLS→TXV</text>
  <text x="530" y="378" text-anchor="middle" font-family="Arial" font-size="8" fill="#475569">LLS→TXV</text>

  <!-- EVAPORATOR 1 -->
  <rect x="68" y="385" width="163" height="64" rx="4" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <path d="M 82,398 H 217 V 413 H 82 V 428 H 217" stroke="#15803d" stroke-width="2" fill="none" stroke-linecap="round"/>
  <text x="150" y="443" text-anchor="middle" font-family="Arial" font-size="9" font-weight="600" fill="#15803d">EVAPORATOR 1</text>

  <!-- EVAPORATOR 2 -->
  <rect x="258" y="385" width="163" height="64" rx="4" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <path d="M 272,398 H 407 V 413 H 272 V 428 H 407" stroke="#15803d" stroke-width="2" fill="none" stroke-linecap="round"/>
  <text x="340" y="443" text-anchor="middle" font-family="Arial" font-size="9" font-weight="600" fill="#15803d">EVAPORATOR 2</text>

  <!-- EVAPORATOR 3 -->
  <rect x="448" y="385" width="163" height="64" rx="4" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <path d="M 462,398 H 597 V 413 H 462 V 428 H 597" stroke="#15803d" stroke-width="2" fill="none" stroke-linecap="round"/>
  <text x="530" y="443" text-anchor="middle" font-family="Arial" font-size="9" font-weight="600" fill="#15803d">EVAPORATOR 3</text>

  <!-- Suction pipes to suction header -->
  <line x1="150" y1="449" x2="150" y2="468" stroke="#15803d" stroke-width="2" marker-end="url(#arr-g)"/>
  <line x1="340" y1="449" x2="340" y2="468" stroke="#15803d" stroke-width="2" marker-end="url(#arr-g)"/>
  <line x1="530" y1="449" x2="530" y2="468" stroke="#15803d" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- SUCTION HEADER -->
  <rect x="60" y="468" width="560" height="28" rx="4" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="340" y="487" text-anchor="middle" font-family="Arial" font-size="12" font-weight="700" fill="#15803d">SUCTION HEADER</text>

  <!-- Suction header → compressors -->
  <line x1="90" y1="496" x2="90" y2="520" stroke="#15803d" stroke-width="2.5"/>
  <line x1="90" y1="520" x2="100" y2="520" stroke="#15803d" stroke-width="2.5" marker-end="url(#arr-g)"/>

  <!-- COMPRESSORS -->
  <rect x="60" y="520" width="200" height="80" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="160" y="548" text-anchor="middle" font-family="Arial" font-size="13" font-weight="700" fill="#92400e">COMPRESSORS</text>
  <circle cx="100" cy="568" r="14" fill="#fef08a" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="100" y="573" text-anchor="middle" font-family="Arial" font-size="9" fill="#92400e">C1</text>
  <circle cx="160" cy="568" r="14" fill="#fef08a" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="160" y="573" text-anchor="middle" font-family="Arial" font-size="9" fill="#92400e">C2</text>
  <circle cx="220" cy="568" r="14" fill="#fef08a" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="220" y="573" text-anchor="middle" font-family="Arial" font-size="9" fill="#92400e">C3</text>
  <text x="160" y="595" text-anchor="middle" font-family="Arial" font-size="8" fill="#78350f">Hot gas discharge →</text>

  <!-- Discharge pipe: compressors → oil separator -->
  <line x1="260" y1="558" x2="300" y2="558" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arr-r)"/>
  <text x="280" y="548" text-anchor="middle" font-family="Arial" font-size="8" fill="#dc2626">hot gas</text>

  <!-- OIL SEPARATOR -->
  <ellipse cx="330" cy="530" rx="28" ry="9" fill="#fecaca" stroke="#dc2626" stroke-width="1.5"/>
  <rect x="302" y="530" width="56" height="70" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <ellipse cx="330" cy="600" rx="28" ry="9" fill="#fca5a5" stroke="#dc2626" stroke-width="1.5"/>
  <text x="330" y="562" text-anchor="middle" font-family="Arial" font-size="10" font-weight="700" fill="#991b1b">OIL</text>
  <text x="330" y="576" text-anchor="middle" font-family="Arial" font-size="10" font-weight="700" fill="#991b1b">SEP.</text>

  <!-- Oil sep → condenser (discharge header, vertical pipe up left side) -->
  <line x1="330" y1="521" x2="330" y2="140" stroke="#dc2626" stroke-width="2.5"/>
  <line x1="330" y1="140" x2="370" y2="140" stroke="#dc2626" stroke-width="2.5"/>
  <line x1="370" y1="140" x2="370" y2="120" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arr-r)"/>
  <text x="342" y="400" font-family="Arial" font-size="8" fill="#dc2626" transform="rotate(-90,342,400)">hot gas discharge header</text>

  <!-- Oil return dashed line -->
  <line x1="330" y1="609" x2="330" y2="630" stroke="#92400e" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="330" y1="630" x2="160" y2="630" stroke="#92400e" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="160" y1="630" x2="160" y2="600" stroke="#92400e" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-g)"/>
  <text x="245" y="643" text-anchor="middle" font-family="Arial" font-size="8" fill="#92400e" font-style="italic">oil return to crankcase</text>

  <!-- LEGEND -->
  <rect x="480" y="525" width="375" height="115" rx="4" fill="#fafafa" stroke="#e2e8f0" stroke-width="1"/>
  <text x="667" y="542" text-anchor="middle" font-family="Arial" font-size="10" font-weight="700" fill="#374151">LEGEND</text>
  <line x1="495" y1="556" x2="525" y2="556" stroke="#2563eb" stroke-width="2.5"/>
  <polygon points="523,552 531,556 523,560" fill="#2563eb"/>
  <text x="535" y="560" font-family="Arial" font-size="9" fill="#374151">Liquid line (high-side)</text>
  <line x1="495" y1="574" x2="525" y2="574" stroke="#15803d" stroke-width="2.5"/>
  <polygon points="523,570 531,574 523,578" fill="#15803d"/>
  <text x="535" y="578" font-family="Arial" font-size="9" fill="#374151">Suction line (low-side)</text>
  <line x1="495" y1="592" x2="525" y2="592" stroke="#dc2626" stroke-width="2.5"/>
  <polygon points="523,588 531,592 523,596" fill="#dc2626"/>
  <text x="535" y="596" font-family="Arial" font-size="9" fill="#374151">Hot gas discharge</text>
  <line x1="495" y1="610" x2="525" y2="610" stroke="#92400e" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="535" y="614" font-family="Arial" font-size="9" fill="#374151">Oil return (crankcase)</text>
  <text x="490" y="632" font-family="Arial" font-size="8" fill="#64748b" font-style="italic">Receiver full = NORMAL (all liquid passes through inline)</text>
</svg>
